experiment:
  mm_per_pixel: 0.045
  sampling_interval_s: 5.0
  cross_section_area_mm2: 100.0  # 试件横截面积，用于还原真实宏观应力 (MPa)
  gauge_length_mm: 80.0          # 引伸计标距，用于同步宏观全局拉伸应变

physics:
  # ==========================================
  # 拓扑筛选与识别防线
  # ==========================================
  strain_threshold_k: 1.5        # 局部化稳健阈值系数。调低以抵抗主裂缝的“应变遮蔽效应”
  morphology_closing_radius: 0   # 形态学闭运算半径。设为 0 以防高密度多缝被错误粘合
  min_crack_area_px: 10          # 最小连通域面积。允许微小裂缝萌生点通过初筛
  min_cracking_strain: 1.5e-4    # 绝对开裂底线 (150微应变)，用作底层光学噪声隔离层

  # ==========================================
  # COD (Crack Opening Displacement) 采样算子
  # ==========================================
  cod_sampling:
    delta_px: 3                  # 避开裂缝中心主应变奇异区的偏移距离
    Delta_px: 10                 # 跨裂缝位移跳跃最大搜索边界

  mad_k: 3.0                     # MAD 局部异常值剔除系数 (Median Absolute Deviation)
  cod_min_mm: 0.002              # 物理提取下限 (2微米分辨率兜底)
  cod_max_mm: 5.0                # 物理提取上限

export:
  # ==========================================
  # 数据落盘与 I/O 调度
  # ==========================================
  target_strains: [0.2, 2.0, 4.0, 6.0]  # 多梯度概率密度演化切片锚点 (Origin Ridgeline 图专供)